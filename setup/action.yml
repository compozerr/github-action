name: 'Setup Compozerr'
description: 'Install the Compozerr CLI and authenticate with an API token'
branding:
  icon: 'terminal'
  color: 'blue'

inputs:
  token:
    description: 'Compozerr API token (cmpz_ prefix). Generate one at Settings > API Tokens.'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Install Compozerr CLI
      shell: bash
      run: /bin/bash -c "$(curl -fsSL https://compozerr.com/install.sh)"

    - name: Add to PATH
      shell: bash
      run: echo "$HOME/.local/compozerr-bin" >> "$GITHUB_PATH"

    - name: Authenticate
      shell: bash
      run: compozerr login --token "${{ inputs.token }}"
